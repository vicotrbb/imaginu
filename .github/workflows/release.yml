name: release

# Cut a release by pushing a semver tag:  git tag v0.1.0 && git push origin v0.1.0
# For a dry run of the whole matrix, use "Run workflow" (workflow_dispatch) with
# a tag ref selected — every target still builds and uploads to that tag's release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-assets:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Pure-Rust crate: no C toolchain to set up. The action cross-compiles the
      # aarch64 linux target via `cross` automatically.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: imaginu
          target: ${{ matrix.target }}
          # Must match [package.metadata.binstall] pkg-url in Cargo.toml:
          #   imaginu-v0.1.0-<target>.tar.gz  (zip on windows)
          archive: imaginu-$tag-$target
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: publish to crates.io
    needs: upload-assets
    runs-on: ubuntu-latest
    # Only publish for real tag pushes, never for a workflow_dispatch dry run,
    # and only after every binary target has built and uploaded successfully.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
