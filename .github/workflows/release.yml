name: release

# Cut a release by pushing a semver tag:  git tag v0.1.0 && git push origin v0.1.0
# For a dry run of the whole matrix, use "Run workflow" (workflow_dispatch) with
# a tag ref selected — every target still builds and uploads to that tag's release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Create the GitHub Release first so the matrix jobs have somewhere to upload
  # to (the upload action requires an existing release for the tag).
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release for ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 && exit 0
          gh release create "${{ github.ref_name }}" --verify-tag \
            --title "imaginu ${{ github.ref_name }}" \
            --notes "See https://github.com/vicotrbb/imaginu/blob/main/CHANGELOG.md"

  upload-assets:
    name: ${{ matrix.target }}
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Pure-Rust crate: no C toolchain to set up. The action cross-compiles the
      # aarch64 linux target via `cross` automatically.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: imaginu
          target: ${{ matrix.target }}
          # Must match [package.metadata.binstall] pkg-url in Cargo.toml:
          #   imaginu-v0.1.0-<target>.tar.gz  (zip on windows)
          archive: imaginu-$tag-$target
          tar: unix
          zip: windows
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: publish to crates.io
    needs: upload-assets
    runs-on: ubuntu-latest
    # Only publish for real tag pushes, never for a workflow_dispatch dry run,
    # and only after every binary target has built and uploaded successfully.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Skip gracefully if the token isn't configured (e.g. the release was
          # published manually), so a tag never produces a failing job.
          if [ -z "$TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            exit 0
          fi
          cargo publish --token "$TOKEN"
